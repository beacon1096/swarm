---
# Synapse Client-Server API.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-synapse
spec:
  hostnames: ["matrix.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: matrix-synapse
          port: 8008
---
# /.well-known/matrix delegation on the apex domain. The chart
# generates `matrix-synapse-wellknown-lighttpd` which serves
# /.well-known/matrix/server and /client with the right JSON.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-wellknown
spec:
  hostnames: ["${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/matrix
      backendRefs:
        - name: matrix-synapse-wellknown-lighttpd
          port: 80
---
# Element Web client.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: element
spec:
  hostnames: ["chat.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: element-web
          port: 80
