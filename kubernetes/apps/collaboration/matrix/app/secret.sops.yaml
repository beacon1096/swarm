# These three live in cluster-secrets so they can be substituted
# into helmrelease.yaml's `extraSecrets:` block as ${VAR}.
# (cluster-secrets gets re-rendered by `task configure` from
# templates/overrides/...sops.yaml.j2 — see that file for source.)
#
# Listed here as a comment for traceability; the actual values are
