# Synapse secrets. registrationSharedSecret carried over from
# swarm-01 (any external bot that knows the old value will continue
# to work). oidc client_secret is read from authentik's restored
# DB — the swarm-01 secret manifest had a stale value that didn't
# match what authentik actually validates against.
#
# Substituted into helmrelease.yaml via cluster-secrets passthrough,
# but those env-style placeholders need their values somewhere; this
# Secret stores them under different keys for the chart to read
# directly via existingSecret refs.
apiVersion: v1
kind: Secret
metadata:
  name: matrix-synapse-secret
stringData:
  #ENC[AES256_GCM,data:m0d8iwg5JxogSu6eFACom7Zv5XQPcuVZcK74WQUYj/h/naoVh/4drB45xl4=,iv:ndpXcy62zNK0NixFBFpYfld13pbZIqTfYVJLjj/xi+8=,tag:mPyuD/2Yt1IWLffa1O1+Kw==,type:comment]
