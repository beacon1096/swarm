---
# CloudNativePG cluster for coder. Pinned to PG 18.3 (matches the
# swarm-01 dump). Coder reads CODER_PG_CONNECTION_URL from
# coder-secret; that URL points at `coder-pg-rw`.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: coder-pg
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  primaryUpdateStrategy: unsupervised

  storage:
    size: 8Gi
    storageClass: longhorn-r3

  bootstrap:
    initdb:
      database: coder
      owner: coder
      secret:
        name: coder-pg-app
      encoding: UTF8

  superuserSecret:
    name: coder-pg-superuser

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  monitoring:
    enablePodMonitor: false
