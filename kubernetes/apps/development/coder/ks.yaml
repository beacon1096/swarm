---
# Coder depends on authentik (OIDC for login). Per-app CNPG cluster
# `coder-pg` is also brought up by this Kustomization; the chart's
# CODER_PG_CONNECTION_URL points at it.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coder
spec:
  dependsOn:
    - name: authentik
      namespace: identity
  interval: 1h
  path: ./kubernetes/apps/development/coder/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: development
  wait: false
  timeout: 10m
