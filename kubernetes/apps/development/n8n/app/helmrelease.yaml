---
# n8n — workflow automation. Local auth only (no SSO via authentik —
# see ADR 0010). N8N_ENCRYPTION_KEY MUST match the swarm-01 cluster:
# n8n encrypts saved credentials (API keys, OAuth tokens for
# integrations) with a key derived from this string. Carrying it
# over verbatim from swarm-01.
#
# Postgres comes from the sibling CNPG cluster (`n8n-pg-rw`).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: n8n
  interval: 1h
  values:
    controllers:
      n8n:
        # n8n's queue/runner state is in the same Pod's filesystem;
        # rolling updates that overlap two pods cause "another
        # process holds X" errors. Recreate strategy serializes the
        # restart.
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.n8n.io/n8nio/n8n
              tag: 2.15.0
            env:
              DB_TYPE: postgresdb
              DB_POSTGRESDB_DATABASE: n8n
              DB_POSTGRESDB_HOST: n8n-pg-rw
              DB_POSTGRESDB_PORT: "5432"
              DB_POSTGRESDB_USER: n8n
              DB_POSTGRESDB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: n8n-pg-app
                    key: password
              GENERIC_TIMEZONE: Asia/Shanghai
              N8N_EDITOR_BASE_URL: https://automaton.${SECRET_DOMAIN}
              N8N_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secret
                    key: n8n-encryption-key
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
              N8N_HOST: automaton.${SECRET_DOMAIN}
              N8N_PORT: "5678"
              N8N_PROTOCOL: https
              N8N_PROXY_HOPS: "1"
              N8N_RUNNERS_ENABLED: "true"
              NODE_ENV: production
              TZ: Asia/Shanghai
              WEBHOOK_URL: https://automaton.${SECRET_DOMAIN}/
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 5678
                  initialDelaySeconds: 60
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 5678
                  initialDelaySeconds: 20
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
    service:
      app:
        controller: n8n
        ports:
          http:
            port: 5678
    persistence:
      data:
        # Pre-created PVC (data-pvc.yaml) so the swarm-01 state
        # tarball can be loaded before n8n starts.
        type: persistentVolumeClaim
        existingClaim: n8n-data
        globalMounts:
          - path: /home/node/.n8n
    route:
      app:
        hostnames: ["automaton.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 5678
