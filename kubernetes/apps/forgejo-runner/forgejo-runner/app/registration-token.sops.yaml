# Forgejo runner registration token — bootstrap-only.
# Consumed by the chart's forgejo-runner-init-config Job (envFrom
# secretRef). Once the runner registers successfully against
# CONFIG_INSTANCE, the chart's upload-config container kubectl-patches
# a persisted credential into the forgejo-runner-config Secret; from
# that point onward this CONFIG_TOKEN is unused (token expires ~7 days
# default but the persisted credential survives).
#
# CONFIG_INSTANCE = cluster-local Service (NO_PROXY exempts
# .svc.cluster.local so the runner's log-stream goes direct, not
# round-trip through sing-box).
# CONFIG_NAME distinguishes from talos-i's "forgejo-runner" so during
# the cutover window both runner rows are unambiguous in the Forgejo
# UI.
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo-runner
type: Opaque
