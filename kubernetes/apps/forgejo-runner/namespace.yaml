---
apiVersion: v1
kind: Namespace
metadata:
  name: forgejo-runner
  labels:
    # Pod Security Admission — defense-in-depth.
    # The talos-ii cluster's effective PSA default appears permissive
    # today (no other namespace has explicit PSA labels yet privileged
    # pods like sing-box DS run successfully), but explicit labels
    # survive any future cluster-wide PSA default change. The dind
    # sidecar in the runner Pod requires `privileged`; both audit and
    # warn are aligned to keep the surface explicit. See spec 003
    # Decisions Resolved Q4.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
