---
# Public ingress via Cloudflare Tunnel → envoy-external. authentik
# *must* be reachable from outside the LAN — it's the OAuth/OIDC
# provider for everything else, and OAuth callback URIs come from
# wherever the user's browser is.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
spec:
  hostnames: ["id.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
