---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  chartRef:
    kind: OCIRepository
    name: coredns
  interval: 1h
  values:
    fullnameOverride: coredns
    image:
      repository: mirror.gcr.io/coredns/coredns
    k8sAppLabelOverride: kube-dns
    serviceAccount:
      create: true
    service:
      name: kube-dns
      clusterIP: "10.55.0.10"
    replicaCount: 2
    servers:
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          - name: autopath
            parameters: "@kubernetes"
          - name: forward
            parameters: . /etc/resolv.conf
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: log
            configBlock: |-
              class error
      # Tailscale Magic DNS forwarder — pods resolve *.tail5d550.ts.net
      # by forwarding to the well-known Tailscale MagicDNS server at
      # 100.100.100.100. Per ADR shared/0002 Option C + spec 004 D6.
      # 100.100.100.100 is reachable via the per-node tailscaled
      # subnet-routers (`siderolabs/tailscale` extension on all 3
      # ms01-* nodes); CoreDNS pods get there via cluster CoreDNS's
      # default routing through the host network namespace where
      # tailscaled provides the route. errors+cache+forward is the
      # canonical minimum for a forward-only zone.
      - zones:
          - zone: ts.net
            scheme: dns://
        port: 53
        plugins:
          - name: errors
          - name: cache
            configBlock: |-
              prefetch 5
          - name: forward
            parameters: . 100.100.100.100
            configBlock: |-
              policy sequential
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
