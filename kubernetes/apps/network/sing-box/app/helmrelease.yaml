---
# In-cluster sing-box egress. Image is built from the NixOS flake at
# /etc/nixos and packaged as a full NixOS rootfs. The image's /init
# IS the entry point — boot it, sops-nix activates against the
# encrypted sing-box.yaml bundled in /nix/store, decrypts using the
# age key mounted at /var/lib/sops-nix/age.key, renders the sing-box
# config JSON via sops.templates, and starts the sing-box.service unit.
# This is the design intent — earlier iterations of this HR bypassed
# /init and supplied a hand-rolled config.json via secret.sops.yaml,
# which drifted from the nix-source-of-truth and is being retired here.
#
# Two inbounds active in this image:
#   - tun-in (auto_redirect=true) — transparent path, picked up by
#     CiliumEgressGatewayPolicy in matched namespaces (per swarm ADR
#     shared/0004 Phase 3)
#   - mixed-in :7890 — env-based fallback, retained until ADR Phase 4
#     burn-in completes and all 5 current consumers (flux-instance,
#     tailscale, matrix, attic, zot) are migrated
#
# DaemonSet on `role=egress`-labeled nodes (currently ms01-a only).
# hostNetwork required so Cilium-forwarded packets land on the bond0.87
# interface and sing-box's auto_redirect nftables rules can intercept.
# privileged required for systemd-in-container (cgroup setup).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sing-box
spec:
  chartRef:
    kind: OCIRepository
    name: sing-box
  interval: 1h
  values:
    controllers:
      sing-box:
        type: daemonset
        containers:
          app:
            # See note above re bootstrap-via-LAN-zot. Tag bumped from
            # `init` to `tproxy-2026-05-04b` for the auto_redirect-enabled
            # rebuild (k8sTransparentProxy=true in /etc/nixos flake.nix).
            image:
              repository: 172.16.80.240:5000/infrastructure/nix-fleet/sing-box
              tag: tproxy-2026-05-04b
            # No command/args override — image entrypoint is /init
            # (NixOS systemd) which boots, runs sops-nix activation,
            # and starts services.sing-box (which the common module
            # enables).
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              # Required for systemd-in-container: cgroup mounts,
              # journald, etc. all need privileged.
              privileged: true
              capabilities:
                add: [NET_ADMIN, NET_RAW]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      hostNetwork: true
      # hostNetwork pods default to host's resolv.conf; we want
      # cluster CoreDNS available too for any in-cluster DNS lookups
      # the rendered sing-box config might do.
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        role: egress
    service:
      sing-box:
        controller: sing-box
        type: ClusterIP
        ports:
          mixed-proxy:
            port: 7890
            protocol: TCP
    persistence:
      age-key:
        # sops-nix age key. Mounted as a single file at
        # /var/lib/sops-nix/age.key — the path the module's
        # `sops.age.keyFile` config (in flake.nix's
        # k8s-sing-box-image build) points at.
        type: secret
        name: sing-box-age-key
        advancedMounts:
          sing-box:
            app:
              - path: /var/lib/sops-nix/age.key
                subPath: age.key
                readOnly: true
      tun:
        # /dev/net/tun for TUN inbound auto_redirect. Talos exposes
        # the device with mode 0666 by default; no schematic change
        # required (verified during shared/0004 Stage 1b spike).
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          sing-box:
            app:
              - path: /dev/net/tun
