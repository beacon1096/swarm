---
# Tailscale operator. Watches Services with annotation
# `tailscale.com/expose: "true"` and provisions tailscale device
# nodes (proxies) for them, joining the cluster's tailnet.
#
# Used today by:
#   - forgejo-tailscale (development namespace)
#   - eventually: longhorn UI, attic, anything internal we want to
#     reach over the tailnet without going through Cloudflare.
#
# OAuth client credentials live in cluster-secrets (re-encrypted
# from swarm-01 era; same OAuth client serves both clusters since
# they're on the same tailnet).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
spec:
  chartRef:
    kind: OCIRepository
    name: tailscale-operator
  interval: 1h
  values:
    oauth:
      clientId: "${SECRET_TAILSCALE_OAUTH_CLIENT_ID}"
      clientSecret: "${SECRET_TAILSCALE_OAUTH_CLIENT_SECRET}"
    operatorConfig:
      image:
        repository: ghcr.io/tailscale/k8s-operator
        tag: v1.96.5
    proxyConfig:
      image:
        repository: ghcr.io/tailscale/tailscale
        tag: v1.96.5
  # Operator pod needs to reach controlplane.tailscale.com for OAuth
  # token exchange. From talos-ii, that endpoint gets GFW-killed
  # (TLS EOF). Route operator's egress through the in-cluster
  # sing-box. We can't put this inside chart values because the
  # tailscale-operator chart doesn't expose env config; patch the
  # rendered Deployment instead.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: operator
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: HTTPS_PROXY
                  value: http://sing-box.network.svc.cluster.local:7890
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: HTTP_PROXY
                  value: http://sing-box.network.svc.cluster.local:7890
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: NO_PROXY
                  value: 127.0.0.1,localhost,10.44.0.0/16,10.55.0.0/16,172.16.0.0/12,svc,svc.cluster.local,cluster.local
