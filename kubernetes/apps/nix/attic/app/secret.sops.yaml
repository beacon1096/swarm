# attic application secret. Holds:
#   - server.toml — the entire attic config, including the inlined
#     DB DSN. Note: $DB_PASSWORD plaintext appears here AND in
#     pg-secret.sops.yaml's attic-pg-app.password — they MUST match.
#     See docs/operations/attic-restore.md for the rotation runbook.
#   - token-rs256-{secret,public-key}-base64 — the JWT signing
#     keypair. Generated once at deploy time; do NOT regenerate
#     after the cache is in use or every issued token becomes
#     unverifiable.
#
# allowed-hosts: "nix.${SECRET_DOMAIN}" is substituted by Flux's
# postBuild; "attic" + "attic.tail5d550.ts.net" cover the tailscale
# operator's per-Service exposure (see service-tailscale.yaml in the
# US1 commit). "attic.nix.svc.cluster.local[:8080]" is the Host
# header sent by in-cluster consumers on talos-ii (e.g. forgejo-
# runner Pod with hostNetwork=true reaching attic via cluster
# CoreDNS) — added 2026-05-04 alongside the talos-ii forgejo-runner
# rollout. attic does not strip the port from Host, so both bare
# and :8080 forms are listed.
#
# REMOVED 2026-05-04: "attic-ts.development.svc.cluster.local[:8080]"
# was the talos-i cross-cluster consumer path (Tailscale operator
# EGRESS proxy used by swarm-01's forgejo-runner). Now that
# forgejo-runner has migrated to talos-ii (spec 003) and connects
# via cluster-local Service, the tailscale-egress wrapper is unused.
