---
# attic — Nix binary cache. CNPG (attic-pg sibling Cluster) and
# longhorn (longhorn-r3) are runtime requirements, but per repo
# convention (see coder/n8n/matrix ks.yaml) we don't list them as
# Flux dependsOn — Flux applies pg-cluster.yaml + helmrelease.yaml
# together and retries until the Cluster CRD is reconciled. No
# authentik dep — attic uses its own bearer-JWT auth, not OIDC.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: attic
spec:
  interval: 1h
  path: ./kubernetes/apps/nix/attic/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: nix
  wait: false
  timeout: 10m
