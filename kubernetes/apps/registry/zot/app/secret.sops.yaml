# zot admin credentials. Two keys:
#   - htpasswd: bcrypt hash line, mounted at /secret/htpasswd via the
#     chart's `mountSecret: true` + `secretFiles.htpasswd` pattern.
#     Single line, format `admin:$2y$10$…`. Rounds=10.
#   - admin-password: the plaintext that produced the bcrypt above.
#     Used by operator tooling (skopeo / helm push / curl probes) and
#     the runbook in docs/operations/zot-restore.md. Same value as the
#     plaintext that hashed into htpasswd.
#
# Both values SOPS-encrypted with the project age key. Rotation = bump
# both keys atomically; old admin tokens are htpasswd-only so there's
# no JWT-like long-tail to invalidate.
