---
# Internal-only UI exposure. Longhorn admin UI must NOT be reachable
# from the internet — the chart has no first-party auth, anyone with
# the URL can wipe volumes. envoy-internal sits behind Tailscale, not
# Cloudflare.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
spec:
  hostnames: ["longhorn.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
