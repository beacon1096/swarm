---
# Three-replica variant of the Longhorn StorageClass for "critical"
# workloads (per ADR talos-ii/0002): forgejo, authentik, vaultwarden,
# matrix-synapse. PVCs that name `storageClassName: longhorn-r3`
# get 3-way replication across all 3 nodes; everything else uses
# `longhorn` (default class with replicaCount=2).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-r3
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
