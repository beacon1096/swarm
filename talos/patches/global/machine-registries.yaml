# Containerd mirror endpoints for image pulls. Phase 4b cutover (spec
# 002-zot-on-talos-ii) moves the primary cache from the LAN host zot at
# 172.16.80.240:5000 to the in-cluster zot Service LB at
# 172.16.87.51:5000 (talos-ii pod registry/zot-0, MetalLB L2).
#
# Talos containerd tries each mirror endpoint in array order; on
# connection failure or 5xx it falls through to the next. So the pattern
# below is "in-cluster zot first, LAN host fallback":
#
#   endpoints:
#     - http://172.16.87.51:5000   # in-cluster zot (primary)
#     - http://172.16.80.240:5000  # LAN host zot (fallback during transition)
#
# Why keep the LAN host as fallback? Two reasons:
#   1. talos-ii itself hosts the in-cluster zot pod. If talos-ii reboots
#      (kernel upgrade, hw failure), the LB IP goes away briefly until
#      MetalLB reassigns; meanwhile other nodes still need to pull.
#   2. The LAN host already has a warm cache of common layers; eviction
#      is cheap, so leaving it as #2 has zero cost.
#
# Two entries DO NOT follow the cluster-first pattern and are kept as
# single LAN-host endpoints on purpose:
#
#   - factory.talos.dev: this is the bootstrap path for Talos node
#     images (amd64 schematics pre-pushed to the LAN host). The
#     in-cluster zot can't bootstrap itself; it needs talos-ii to
#     already be up. Chicken-and-egg, so this stays on the LAN host.
#
#   - 172.16.80.240:5000 (self-ref): tells containerd the LAN host
#     speaks plain HTTP, not HTTPS. Required so any HelmRelease that
#     references `172.16.80.240:5000/foo:bar` directly skips TLS.
#     (No symmetric self-ref for 172.16.87.51:5000 yet because nothing
#     references that hostname directly — only the indirection above.)
#
# zot on the in-cluster pod is configured with extensions.sync against
# the same 9 upstreams listed below; LAN host zot syncs the same list.
# Both use sing-box for upstream egress (cluster pod via egress
# NetworkPolicy + cluster sing-box; LAN host via HTTPS_PROXY env).
machine:
  registries:
    mirrors:
      factory.talos.dev:
        endpoints:
          - http://172.16.80.240:5000
      docker.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      ghcr.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      quay.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      mirror.gcr.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      gcr.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      registry.k8s.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      docker.elastic.co:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      code.forgejo.org:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      # n8n's official image registry. Added 2026-04-28 when the
      # first n8n pod sat in ContainerCreating for 5+ min trying to
      # pull `docker.n8n.io/n8nio/n8n:2.15.0` directly across the
      # GFW-flaky default egress. Also synced by zot on both the
      # in-cluster pod and the LAN host.
      docker.n8n.io:
        endpoints:
          - http://172.16.87.51:5000
          - http://172.16.80.240:5000
      # Self-referential entry: tell containerd that 172.16.80.240:5000
      # is plain HTTP (not HTTPS, which is the default for image URLs
      # without an explicit scheme). Without this, an image reference
      # like `172.16.80.240:5000/foo:bar` from a HelmRelease would fail
      # the TLS handshake because zot serves only HTTP.
      "172.16.80.240:5000":
        endpoints:
          - http://172.16.80.240:5000
      # NOTE on forgejo.beaco.works: we deliberately DON'T add a mirror
      # entry here. Talos's containerd uses the host's resolver
      # (172.16.87.254 → UDR Pro), which can't resolve
      # *.svc.cluster.local. Instead `forgejo.beaco.works` is rewritten
      # via /etc/hosts (machine.network.extraHostEntries in the global
      # machine-network patch) to the envoy-internal LB IP 172.16.87.21,
      # and an HTTPRoute on envoy-internal handles the routing back to
      # forgejo-http. The image pull then traverses LAN only — no
      # Cloudflare hop, no CF rate limits, no 502s on big blobs.
