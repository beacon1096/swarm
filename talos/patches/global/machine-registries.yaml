# Mirror factory.talos.dev (and other Talos image hosts) through the local
# zot pull-through cache on the proxy host. The first node-bootstrap pull
# goes via sing-box/proxy and gets cached locally; subsequent pulls (other
# nodes, upgrades) hit the LAN mirror at gigabit speeds and skip the GFW
# and the slow proxy entirely.
#
# Mirror endpoint is plain HTTP (no TLS) on the proxy host's :5000 — fine
# for an internal LAN mirror; Talos accepts http:// in mirror endpoints.
#
# overridePath is left default (false) so requests preserve the
# `/v2/<repo>/` structure that zot expects.
machine:
  registries:
    mirrors:
      factory.talos.dev:
        endpoints:
          - http://172.16.80.240:5000
      # Pull-through cache for the public registries we actually pull from.
      # zot on .80.240 is configured (extensions.sync, onDemand) to fetch
      # and cache from the upstream of the same name on first request.
      # Outbound from .80.240 to the upstreams goes via sing-box
      # (HTTPS_PROXY env on the talos-mirror systemd unit drop-in
      # /etc/systemd/system/talos-mirror.service.d/proxy.conf), so
      # GFW-blocked egress isn't a concern at the cluster level anymore.
      docker.io:
        endpoints:
          - http://172.16.80.240:5000
      ghcr.io:
        endpoints:
          - http://172.16.80.240:5000
      quay.io:
        endpoints:
          - http://172.16.80.240:5000
      mirror.gcr.io:
        endpoints:
          - http://172.16.80.240:5000
      code.forgejo.org:
        endpoints:
          - http://172.16.80.240:5000
      # n8n's official image registry. Added 2026-04-28 when the
      # first n8n pod sat in ContainerCreating for 5+ min trying to
      # pull `docker.n8n.io/n8nio/n8n:2.15.0` directly across the
      # GFW-flaky default egress. Also added to zot.json's
      # extensions.sync.registries[] on the proxy host.
      docker.n8n.io:
        endpoints:
          - http://172.16.80.240:5000
      # Self-referential entry: tell containerd that 172.16.80.240:5000
      # is plain HTTP (not HTTPS, which is the default for image URLs
      # without an explicit scheme). Without this, an image reference
      # like `172.16.80.240:5000/foo:bar` from a HelmRelease would fail
      # the TLS handshake because zot serves only HTTP.
      "172.16.80.240:5000":
        endpoints:
          - http://172.16.80.240:5000
      # NOTE on forgejo.beaco.works: we deliberately DON'T add a mirror
      # entry here. Talos's containerd uses the host's resolver
      # (172.16.87.254 → UDR Pro), which can't resolve
      # *.svc.cluster.local. Instead `forgejo.beaco.works` is rewritten
      # via /etc/hosts (machine.network.extraHostEntries in the global
      # machine-network patch) to the envoy-internal LB IP 172.16.87.21,
      # and an HTTPRoute on envoy-internal handles the routing back to
      # forgejo-http. The image pull then traverses LAN only — no
      # Cloudflare hop, no CF rate limits, no 502s on big blobs.
