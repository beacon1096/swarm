---
# Override of templates/config/talos/talconfig.yaml.j2 — the upstream
# single-NIC networkInterfaces block (lines 37-65) is replaced with an
# LACP bond on the X710 SFP+ ports (driver i40e). talhelper does not
# support RFC6902 JSON patches on multi-doc machineconfig, and a
# strategic-merge patch on `machine.network.interfaces` would append
# rather than replace, so overriding the template is the cleanest path.
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://172.16.87.1:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "172.16.87.1"
  - "talos-ii.beaco.works"
additionalMachineCertSans: *sans

clusterPodNets: ["10.44.0.0/16"]
clusterSvcNets: ["10.55.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "ms01-a"
    ipAddress: "172.16.87.201"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/012427dcde4d2c4eff11f55adf2f20679292fcdffb76b5700dd022c813908b07
    controlPlane: true
    networkInterfaces:
      # Explicit NIC names instead of deviceSelectors: talhelper 3.1.x splits
      # bond+vlan into modular configs (BondConfig/VLANConfig kinds) when
      # deviceSelectors is used, and silently drops VIP during that translation.
      # All three MS-01 hosts have identical X710 NIC naming.
      - interface: bond0
        bond:
          interfaces:
            - enp2s0f0np0
            - enp2s0f1np1
          mode: 802.3ad
          lacpRate: fast
          xmitHashPolicy: layer3+4
          miimon: 100
          downdelay: 200
          updelay: 200
        mtu: 1500
        vlans:
          - vlanId: 87
            addresses:
              - "172.16.87.201/24"
            mtu: 1500
            routes:
              - gateway: "172.16.87.254"
                network: 0.0.0.0/0
        # VIP is configured via talos/patches/controller/vip.yaml — talhelper
        # silently drops VIP fields when translating bond+vlan into modular
        # configs, so we add it post-translation as a controller-only patch.
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
          systemDiskEncryption:
            state:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
      # ext-tailscale ESC removed 2026-05-05 — siderolabs/tailscale host
      # extension's kernel-mode tailscaled installs `ip rule` policy
      # routing (priority 5210/5230/5250/5270 + table 52) that wedges
      # sing-box tun-in's reply path. ADR talos-ii/0014 superseded;
      # successor design uses an in-cluster userspace tailscale Pod
      # behind a SOCKS5 outbound (decoupled from Talos extensions, future
      # netbird-swappable). Schematic still includes the extension
      # binary; without ESC it stays in Waiting, never starts.
      # - "@./patches/ms01-a/machine-tailscale.yaml"
  - hostname: "ms01-b"
    ipAddress: "172.16.87.202"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/012427dcde4d2c4eff11f55adf2f20679292fcdffb76b5700dd022c813908b07
    controlPlane: true
    networkInterfaces:
      # Explicit NIC names instead of deviceSelectors: talhelper 3.1.x splits
      # bond+vlan into modular configs (BondConfig/VLANConfig kinds) when
      # deviceSelectors is used, and silently drops VIP during that translation.
      # All three MS-01 hosts have identical X710 NIC naming.
      - interface: bond0
        bond:
          interfaces:
            - enp2s0f0np0
            - enp2s0f1np1
          mode: 802.3ad
          lacpRate: fast
          xmitHashPolicy: layer3+4
          miimon: 100
          downdelay: 200
          updelay: 200
        mtu: 1500
        vlans:
          - vlanId: 87
            addresses:
              - "172.16.87.202/24"
            mtu: 1500
            routes:
              - gateway: "172.16.87.254"
                network: 0.0.0.0/0
        # VIP is configured via talos/patches/controller/vip.yaml — talhelper
        # silently drops VIP fields when translating bond+vlan into modular
        # configs, so we add it post-translation as a controller-only patch.
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
          systemDiskEncryption:
            state:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
      # See ms01-a — ESC removed 2026-05-05 (ADR 0014 superseded).
      # - "@./patches/ms01-b/machine-tailscale.yaml"
  - hostname: "ms01-c"
    ipAddress: "172.16.87.203"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/012427dcde4d2c4eff11f55adf2f20679292fcdffb76b5700dd022c813908b07
    controlPlane: true
    networkInterfaces:
      # Explicit NIC names instead of deviceSelectors: talhelper 3.1.x splits
      # bond+vlan into modular configs (BondConfig/VLANConfig kinds) when
      # deviceSelectors is used, and silently drops VIP during that translation.
      # All three MS-01 hosts have identical X710 NIC naming.
      - interface: bond0
        bond:
          interfaces:
            - enp2s0f0np0
            - enp2s0f1np1
          mode: 802.3ad
          lacpRate: fast
          xmitHashPolicy: layer3+4
          miimon: 100
          downdelay: 200
          updelay: 200
        mtu: 1500
        vlans:
          - vlanId: 87
            addresses:
              - "172.16.87.203/24"
            mtu: 1500
            routes:
              - gateway: "172.16.87.254"
                network: 0.0.0.0/0
        # VIP is configured via talos/patches/controller/vip.yaml — talhelper
        # silently drops VIP fields when translating bond+vlan into modular
        # configs, so we add it post-translation as a controller-only patch.
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
          systemDiskEncryption:
            state:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
      # See ms01-a — ESC removed 2026-05-05 (ADR 0014 superseded).
      # - "@./patches/ms01-c/machine-tailscale.yaml"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-registries.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  # TS_AUTHKEY patch removed 2026-05-05 — host-mode ext-tailscale
  # disabled (see ms01-{a,b,c}/machine-tailscale.yaml notes above).
  # File kept under patches/global/ for SOPS history / future reference;
  # not referenced by talconfig until / unless host-mode revisited.
  # - "@./patches/global/extension-tailscale-authkey.sops.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/vip.yaml"

